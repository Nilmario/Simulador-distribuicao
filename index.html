<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor - Simulador de Distribuição</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#eef2f5;margin:0;padding:12px;color:#263238;}
  h1{text-align:center;color:#1a3c5e;margin:6px 0;font-size:22px;}
  .topbar{display:flex;justify-content:center;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
  .dia{font-size:20px;color:#102a43;font-weight:bold;}
  button{padding:11px 20px;font-size:15px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
  .iniciar{background:#2e7d4f;color:#fff;}
  .avancar{background:#1a3c5e;color:#fff;}
  .reset{background:#c0392b;color:#fff;}
  .opt{background:#546e7a;color:#fff;}
  button:disabled{background:#999;cursor:not-allowed;}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:1500px;margin:0 auto;}
  .equipe{background:#fff;border-radius:14px;padding:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;}
  .eqHead{text-align:center;font-weight:bold;color:#fff;padding:8px;border-radius:8px;margin-bottom:8px;font-size:15px;}

  .fluxo{display:flex;align-items:center;gap:8px;}
  .col{text-align:center;}
  .box{background:#fff;border:2px solid #e0e6ea;border-radius:10px;overflow:hidden;min-width:90px;}
  .titSec{font-size:12px;font-weight:bold;color:#fff;padding:6px;}
  .fornecedor .titSec{background:#2e7d4f;}
  .cd .titSec{background:#1a3c5e;}
  .icon{font-size:38px;margin:6px 0;}
  .estoqueCD{font-size:26px;font-weight:bold;color:#1a3c5e;}
  .estoqueCD small{display:block;font-size:11px;color:#789;font-weight:normal;}

  /* ===== ESTRADA Forn→CD ===== */
  .estradaWrap{flex:1;min-width:90px;}
  .estrada{position:relative;height:26px;background:#37474f;border-radius:5px;
    background-image:repeating-linear-gradient(90deg,transparent 0 16px,#ffca28 16px 30px);
    background-size:30px 4px;background-repeat:repeat-x;background-position:center;}
  .estrada small{display:block;text-align:center;font-size:10px;color:#546e7a;margin-top:3px;}
  /* caminhão posicionado por JS (left %), virado para a DIREITA */
  .caminhao{position:absolute;top:-8px;font-size:22px;
    transform:scaleX(-1);transition:left .8s ease;}
  .estrada.parada .caminhao{opacity:.25;}

  /* ===== ESTRADA CD→Loja ===== */
  .estradaLoja{position:relative;height:18px;background:#37474f;border-radius:4px;flex:1;min-width:50px;
    background-image:repeating-linear-gradient(90deg,transparent 0 10px,#ffca28 10px 18px);
    background-size:18px 3px;background-repeat:repeat-x;background-position:center;}
  .estradaLoja .caminhao{position:absolute;top:-6px;font-size:15px;
    transform:scaleX(-1);transition:left .8s ease;}
  .estradaLoja.parada .caminhao{opacity:.25;}
  /* coluna da estrada da loja + legenda embaixo */
  .lojaEstradaCol{display:flex;flex-direction:column;align-items:stretch;min-width:55px;}
  .transLojaLabel{text-align:center;font-size:9px;color:#1a3c5e;margin-top:2px;white-space:nowrap;font-weight:bold;}

  .lojas{display:flex;flex-direction:column;gap:5px;}
  .loja{display:flex;align-items:center;gap:5px;font-size:12px;background:#f5f8fa;padding:4px 6px;border-radius:6px;}
  .casa{font-size:18px;}
  .lojaInfo{flex:1;}
  .lojaInfo b{color:#102a43;}
  .lojaInfo span{color:#789;}
  .falta{color:#c0392b !important;font-weight:bold;}

  .resumo{font-size:12px;margin-top:8px;border-top:1px solid #eee;padding-top:6px;}
  .resumo div{display:flex;justify-content:space-between;padding:2px 6px;}
  .rec{color:#2e7d4f;font-weight:bold;}
  .cst{color:#c0392b;font-weight:bold;}
  .lucro{border-top:1px solid #ddd;margin-top:3px;padding-top:4px;font-weight:bold;font-size:15px;}
  .nivel{text-align:center;font-size:12px;color:#546e7a;margin-top:4px;}
  .vazio{text-align:center;color:#789;padding:40px;font-size:15px;grid-column:1/-1;}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;align-items:center;justify-content:center;}
  .modal{background:#fff;border-radius:14px;padding:22px;width:92%;max-width:520px;max-height:90vh;overflow:auto;}
  .modal h3{margin:0 0 14px;text-align:center;color:#1a3c5e;}
  .modal h4{margin:16px 0 6px;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .row label{font-size:13px;font-weight:bold;display:block;margin-bottom:2px;}
  .row input{width:100%;padding:8px;border-radius:6px;border:1px solid #ccc;font-size:14px;}
  .modalBtns{display:flex;gap:10px;margin-top:18px;}

  .rankBox{display:none;max-width:600px;margin:0 auto 16px;background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
  .rankBox h2{text-align:center;color:#1a3c5e;margin:0 0 12px;}
  .rankItem{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:8px;font-size:16px;font-weight:bold;color:#fff;}

  #qrBox{position:fixed;bottom:12px;right:12px;background:#fff;padding:10px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.15);text-align:center;font-size:11px;}
</style>
</head>
<body>
<h1>📦 Simulador de Cadeia de Suprimentos</h1>
<div class="topbar">
  <span class="dia">DIA <span id="diaAtual">0</span> / <span id="totalDias">30</span></span>
  <button id="btnIniciar" class="iniciar" onclick="iniciarJogo()">▶️ INICIAR (Dia 0)</button>
  <button id="btnAvancar" class="avancar" onclick="avancarDia()" disabled>⏭️ AVANÇAR DIA</button>
  <button onclick="abrirOpcoes()" class="opt">⚙️ OPÇÕES</button>
  <button onclick="resetar()" class="reset">🔄 REINICIAR</button>
</div>

<div id="rankBox" class="rankBox">
  <h2>🏆 RANKING FINAL</h2>
  <div id="rankLista"></div>
</div>

<div id="grid" class="grid"></div>

<div id="qrBox"><div id="qrcode"></div><div>📱 Acesse pelo celular</div></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>⚙️ Configurar Variáveis</h3>
    <div class="row">
      <div><label>Custo de compra (un)</label><input type="number" id="cfgCompra"></div>
      <div><label>Preço de venda (un)</label><input type="number" id="cfgVenda"></div>
      <div><label>Custo de estoque (un/dia)</label><input type="number" id="cfgEstoque"></div>
      <div><label>Custo de falta (un)</label><input type="number" id="cfgFalta"></div>
      <div><label>Custo fixo por pedido</label><input type="number" id="cfgPedido"></div>
      <div><label>Custo encerramento (un)</label><input type="number" id="cfgEncerr"></div>
    </div>
    <h4 style="color:#2e7d4f;border-bottom:2px solid #2e7d4f">🏭 Fornecedor → CD</h4>
    <div class="row">
      <div><label>Lead rápido (dias)</label><input type="number" id="cfgFornLeadRap"></div>
      <div><label>Lead econômico (dias)</label><input type="number" id="cfgFornLeadEco"></div>
    </div>
    <h4 style="color:#1a3c5e;border-bottom:2px solid #1a3c5e">🏬 CD → Loja</h4>
    <div class="row">
      <div><label>Lead rápido (dias)</label><input type="number" id="cfgLojaLeadRap"></div>
      <div><label>Lead econômico (dias)</label><input type="number" id="cfgLojaLeadEco"></div>
    </div>
    <h4 style="color:#546e7a;border-bottom:2px solid #546e7a">🎲 Geral</h4>
    <div class="row">
      <div><label>Demanda mínima</label><input type="number" id="cfgDemMin"></div>
      <div><label>Demanda máxima</label><input type="number" id="cfgDemMax"></div>
      <div><label>Total de dias</label><input type="number" id="cfgDias"></div>
      <div><label>Estoque inicial CD</label><input type="number" id="cfgEstoqueCD"></div>
    </div>
    <div class="modalBtns">
      <button class="iniciar" style="flex:1" onclick="salvarOpcoes()">💾 Salvar</button>
      <button class="reset" style="flex:1" onclick="fecharOpcoes()">✖️ Cancelar</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_U9JAwdjIBG-GQAPWTlQ99B7ZYpSW01w",
  authDomain: "simulador-distribuicao.firebaseapp.com",
  databaseURL: "https://simulador-distribuicao-default-rtdb.firebaseio.com",
  projectId: "simulador-distribuicao",
  storageBucket: "simulador-distribuicao.appspot.com",
  messagingSenderId: "COLE_AQUI_SEU_SENDER_ID",
  appId: "COLE_AQUI_SEU_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const EQUIPES = ["A","B","C","D"];
const NUM_LOJAS = 3;
const CORES = {A:"#2e7d4f", B:"#1a3c5e", C:"#8e44ad", D:"#d35400"};
const MEDALHAS = ["🥇","🥈","🥉","4️⃣"];

let CFG = {
  custoCompra:70, precoVenda:100, custoEstoque:10, custoFalta:100,
  custoPedido:2, custoEncerramento:3,
  // 🔒 FRETE FIXO (não editável no modal)
  forn_freteRapido:5, forn_freteEconomico:2,
  forn_leadRapido:12,  forn_leadEconomico:16,
  loja_freteRapido:3, loja_freteEconomico:1,
  loja_leadRapido:4,  loja_leadEconomico:6,
  demandaMin:0, demandaMax:4,
  totalDias:35, estoqueInicialCD:120
};

let diaAtual = 0;
let jogoIniciado = false;
let ultimasEquipes = {};

const rand = (min,max)=>Math.floor(Math.random()*(max-min+1))+min;
const $ = id => document.getElementById(id);

/* ===== Helper: progresso (0→1) do caminhão na pista =====
   diaChegada = chave em chegadasCD/chegadasLoja (dia em que a carga chega)
   lead       = tempo total de viagem
   dia        = dia atual
   Retorna a fração JÁ percorrida da pista. */
function progressoViagem(diaChegada, lead, dia){
  diaChegada = Number(diaChegada);
  if(!diaChegada || !lead || lead<=0) return 0;
  const saida = diaChegada - lead;     // dia em que a carga saiu
  let p = (dia - saida) / lead;        // fração percorrida
  if(p < 0) p = 0;
  if(p > 1) p = 1;
  return p;
}

/* Pega a viagem MAIS PRÓXIMA de chegar (maior progresso) p/ posicionar o caminhão */
function melhorProgressoCD(chegadasCD, lead, dia){
  let melhor = 0, achou = false;
  for(const k in chegadasCD){
    if((chegadasCD[k]||0) <= 0) continue;
    achou = true;
    const p = progressoViagem(k, lead, dia);
    if(p > melhor) melhor = p;
  }
  return achou ? melhor : -1; // -1 = nenhuma viagem
}

function melhorProgressoLoja(chegadasLoja, loja, lead, dia){
  let melhor = 0, achou = false;
  for(const k in chegadasLoja){
    const q = (chegadasLoja[k] && chegadasLoja[k][loja]) || 0;
    if(q <= 0) continue;
    achou = true;
    const p = progressoViagem(k, lead, dia);
    if(p > melhor) melhor = p;
  }
  return achou ? melhor : -1;
}

window.onload = () => {
  db.ref("jogo/config").once("value").then(s=>{
    if(s.exists()) CFG = {...CFG, ...s.val()};
    $("totalDias").textContent = CFG.totalDias;
  });

  db.ref("jogo/estado").on("value", s=>{
    const st = s.val()||{};
    diaAtual = st.dia||0;
    jogoIniciado = st.iniciado||false;
    $("diaAtual").textContent = diaAtual;
    $("btnIniciar").disabled = jogoIniciado;
    $("btnAvancar").disabled = !jogoIniciado || diaAtual>=CFG.totalDias;
    atualizarRanking();
    render({val:()=>ultimasEquipes});
  });

  db.ref("equipes").on("value", s=>{
    ultimasEquipes = s.val()||{};
    render(s);
    atualizarRanking();
  });

  new QRCode($("qrcode"), {
  text: location.origin + location.pathname.replace(/[^/]*$/, "") + "celular_v4.html",
  width: 90,
  height: 90
});
};

/* ====== RENDER ====== */
function render(snap){
  const equipes = snap.val()||{};
  const grid = $("grid");
  grid.innerHTML = "";

  const visiveis = EQUIPES.filter(id => equipes[id] && equipes[id].ativa);

  if(visiveis.length === 0){
    grid.innerHTML = `<div class="vazio">⏳ Aguardando equipes selecionarem no celular...</div>`;
    return;
  }

  visiveis.forEach(id=>{
    const e = equipes[id];
    const cor = CORES[id];
    const estLojas = e.estoqueLojas||{};
    const dem = e.demandaLojas||{};

    const transCD = (e.emTransitoCD != null) ? e.emTransitoCD : (e.emTransito||0);
    const tl = e.transitoLojas || {};
    const chegadasCD   = e.chegadasCD   || {};
    const chegadasLoja = e.chegadasLoja || {};

    // ===== POSIÇÃO DO CAMINHÃO Forn→CD =====
    const leadCDmedio = (CFG.forn_leadRapido + CFG.forn_leadEconomico)/2; // fallback
    // tenta achar lead exato pela carga em viagem; usa o pedido salvo se houver
    let posCD = 0, parada = "parada";
    if(jogoIniciado && transCD > 0){
      // usa o maior lead como referência de pista (econômico) p/ a régua de % funcionar p/ ambos
      const pRap = melhorProgressoCD(chegadasCD, CFG.forn_leadRapido, diaAtual);
      const pEco = melhorProgressoCD(chegadasCD, CFG.forn_leadEconomico, diaAtual);
      const p = Math.max(pRap, pEco); // pega o mais adiantado
      if(p >= 0){ posCD = p*88; parada = ""; } // 88% p/ caminhão não sair da pista
    }

    let lojasHTML = "";
    for(let l=1;l<=NUM_LOJAS;l++){
      const est = estLojas[l]||0;
      const d = dem[l]||0;
      const falta = est<d;
      const emCaminho = tl[l]||0;

      // ===== POSIÇÃO DO CAMINHÃO CD→Loja =====
      let posL = 0, paradaL = "parada";
      if(jogoIniciado && emCaminho > 0){
        const pRap = melhorProgressoLoja(chegadasLoja, l, CFG.loja_leadRapido, diaAtual);
        const pEco = melhorProgressoLoja(chegadasLoja, l, CFG.loja_leadEconomico, diaAtual);
        const p = Math.max(pRap, pEco);
        if(p >= 0){ posL = p*80; paradaL = ""; }
      }

      lojasHTML += `
        <div class="loja">
          <div class="lojaEstradaCol">
            <div class="estradaLoja ${paradaL}">
              <div class="caminhao" style="left:${posL}%">🚚</div>
            </div>
            <div class="transLojaLabel">CD→Loja: ${emCaminho}</div>
          </div>
          <span class="casa">🏪</span>
          <div class="lojaInfo">
            <b>Loja ${l}</b> · Estoque: <b class="${falta?'falta':''}">${est}</b><br>
            <span>Demanda: ${d}</span>
          </div>
        </div>`;
    }

    grid.innerHTML += `
      <div class="equipe">
        <div class="eqHead" style="background:${cor}">EQUIPE ${id}</div>
        <div class="fluxo">
          <div class="col box fornecedor">
            <div class="titSec">🏭 FORNECEDOR</div>
            <div class="icon">🏭</div>
          </div>
          <div class="estradaWrap">
            <div class="estrada ${parada}">
              <div class="caminhao" style="left:${posCD}%">🚛</div>
            </div>
            <small>Forn→CD: ${transCD}</small>
          </div>
          <div class="col box cd">
            <div class="titSec">🏬 CD</div>
            <div class="icon">🏬</div>
            <div class="estoqueCD">${e.estoqueCD||0}<small>estoque CD</small></div>
          </div>
          <div class="col lojas">${lojasHTML}</div>
        </div>
        <div class="resumo">
          <div><span>Receita</span><span class="rec">R$ ${(e.receita||0).toFixed(0)}</span></div>
          <div><span>Custo produtos</span><span class="cst">R$ ${(e.custoProdutos||0).toFixed(0)}</span></div>
          <div><span>Custo pedidos/frete</span><span class="cst">R$ ${(e.custoPedidos||0).toFixed(0)}</span></div>
          <div><span>Custo estoque</span><span class="cst">R$ ${(e.custoEstoque||0).toFixed(0)}</span></div>
          <div><span>Custo falta</span><span class="cst">R$ ${(e.custoFalta||0).toFixed(0)}</span></div>
          <div><span>Custo encerramento</span><span class="cst">R$ ${(e.custoEncerramento||0).toFixed(0)}</span></div>
          <div class="lucro"><span>LUCRO</span><span style="color:${(e.lucro||0)>=0?'#2e7d4f':'#c0392b'}">R$ ${(e.lucro||0).toFixed(0)}</span></div>
        </div>
        <div class="nivel">📊 Nível de serviço: <b>${e.nivelServico||100}%</b></div>
      </div>`;
  });
}

/* ====== RANKING FINAL ====== */
function atualizarRanking(){
  const box = $("rankBox");
  if(!jogoIniciado || diaAtual < CFG.totalDias){ box.style.display="none"; return; }
  const lista = EQUIPES
    .filter(id=>ultimasEquipes[id] && ultimasEquipes[id].ativa)
    .map(id=>({id, lucro: ultimasEquipes[id].lucro||0, nivel: ultimasEquipes[id].nivelServico||0}))
    .sort((a,b)=>b.lucro-a.lucro);
  let html = "";
  lista.forEach((eq,i)=>{
    html += `<div class="rankItem" style="background:${CORES[eq.id]}">
      <span>${MEDALHAS[i]} Equipe ${eq.id}</span>
      <span>R$ ${eq.lucro.toFixed(0)} · ${eq.nivel}%</span>
    </div>`;
  });
  $("rankLista").innerHTML = html;
  box.style.display = "block";
}

/* ====== CONTROLE DO JOGO ====== */
function iniciarJogo(){
  if(!confirm("Iniciar o jogo no Dia 0? Isso zera o estado das equipes.")) return;
  const base = {};
  EQUIPES.forEach(id=>{
    base[id] = {
      ativa: false,
      estoqueCD: CFG.estoqueInicialCD,
      estoqueLojas: {1:20,2:20,3:20},
      demandaLojas: {1:0,2:0,3:0},
      transitoLojas: {1:0,2:0,3:0},
      chegadasCD: {}, chegadasLoja: {},
      emTransito: 0, emTransitoCD: 0, emTransitoLoja: 0,
      receita:0, custoProdutos:0, custoPedidos:0,
      custoEstoque:0, custoFalta:0, custoEncerramento:0,
      lucro:0, nivelServico:100, fillRate:100, pedidoFornecedor:0
    };
  });
  db.ref("equipes").set(base);
  db.ref("decisoes").remove();
  db.ref("jogo/estado").set({dia:0, iniciado:true, partidaId: Date.now()});
}

async function avancarDia(){
  if(diaAtual >= CFG.totalDias){ alert("⛔ O jogo já terminou!"); return; }
  $("btnAvancar").disabled = true;

  const equipesSnap = await db.ref("equipes").once("value");
  const decisoesSnap = await db.ref("decisoes/dia"+diaAtual).once("value");
  const equipes = equipesSnap.val()||{};
  const decisoes = decisoesSnap.val()||{};

  for(const id of EQUIPES){
    const e = equipes[id]; if(!e) continue;
    const dec = decisoes[id]||{};
    let estoqueCD = e.estoqueCD||0, lucro = e.lucro||0;
    let receita = e.receita||0, custoProdutos = e.custoProdutos||0, custoPedidos = e.custoPedidos||0;
    let custoEstoque = e.custoEstoque||0, custoFalta = e.custoFalta||0, custoEncerramento = e.custoEncerramento||0;
    let chegadasCD = e.chegadasCD||{};
    let chegadasLoja = e.chegadasLoja||{};
    let estoqueLojas = e.estoqueLojas||{1:20,2:20,3:20};
    let demandaLojas = {}, demTotal = 0, vendTotal = 0;

    if(chegadasCD[diaAtual]){ estoqueCD += chegadasCD[diaAtual]; delete chegadasCD[diaAtual]; }

    if(chegadasLoja[diaAtual]){
      for(let l=1;l<=NUM_LOJAS;l++) estoqueLojas[l] = (estoqueLojas[l]||0)+(chegadasLoja[diaAtual][l]||0);
      delete chegadasLoja[diaAtual];
    }

    const pedido = dec.pedidoFornecedor||0;
    if(pedido>0){
      const rap = dec.modoForn==="rapido";
      const lead  = rap?CFG.forn_leadRapido :CFG.forn_leadEconomico;
      const frete = rap?CFG.forn_freteRapido:CFG.forn_freteEconomico;
      chegadasCD[diaAtual+lead] = (chegadasCD[diaAtual+lead]||0)+pedido;
      const compra = pedido*CFG.custoCompra, fr = pedido*frete;
      custoProdutos += compra; custoPedidos += CFG.custoPedido+fr; lucro -= (compra+CFG.custoPedido+fr);
    }

    const remessas = dec.remessas||{1:0,2:0,3:0};
    const rapLoja = dec.modoLoja==="rapido";
    const leadLoja  = rapLoja?CFG.loja_leadRapido :CFG.loja_leadEconomico;
    const freteLoja = rapLoja?CFG.loja_freteRapido:CFG.loja_freteEconomico;
    let totalRemessa = 0;
    for(let l=1;l<=NUM_LOJAS;l++){
      let env = Math.min(remessas[l]||0, estoqueCD);
      estoqueCD -= env; totalRemessa += env;
      if(env>0){
        const diaChega = diaAtual+leadLoja;
        if(!chegadasLoja[diaChega]) chegadasLoja[diaChega] = {1:0,2:0,3:0};
        chegadasLoja[diaChega][l] = (chegadasLoja[diaChega][l]||0)+env;
      }
    }
    if(totalRemessa>0){
      const frLoja = totalRemessa*freteLoja;
      custoPedidos += frLoja; lucro -= frLoja;
    }

    for(let l=1;l<=NUM_LOJAS;l++){
      const d = rand(CFG.demandaMin, CFG.demandaMax); demandaLojas[l]=d; demTotal+=d;
      const vend = Math.min(estoqueLojas[l], d); vendTotal+=vend; estoqueLojas[l]-=vend;
      const faltou = d-vend;
      receita += vend*CFG.precoVenda; lucro += vend*CFG.precoVenda;
      custoFalta += faltou*CFG.custoFalta; lucro -= faltou*CFG.custoFalta;
    }

    let estLojas = 0; for(let l=1;l<=NUM_LOJAS;l++) estLojas += estoqueLojas[l];
    const cEst = (estoqueCD+estLojas)*CFG.custoEstoque; custoEstoque += cEst; lucro -= cEst;

    if(diaAtual+1 >= CFG.totalDias){
      const cEnc = (estoqueCD+estLojas)*CFG.custoEncerramento;
      custoEncerramento += cEnc; lucro -= cEnc;
    }

    let emTransitoCD = 0, emTransitoLoja = 0;
    let transitoLojas = {1:0,2:0,3:0};
    for(const dd in chegadasCD) emTransitoCD += chegadasCD[dd];
    for(const dd in chegadasLoja){
      for(let l=1;l<=NUM_LOJAS;l++){
        const q = chegadasLoja[dd][l]||0;
        emTransitoLoja += q;
        transitoLojas[l] += q;
      }
    }
    const emTransito = emTransitoCD + emTransitoLoja;
    const nivel = demTotal>0?Math.round(vendTotal/demTotal*100):100;

    await db.ref("equipes/"+id).update({
      estoqueCD, estoqueLojas, demandaLojas, chegadasCD, chegadasLoja,
      emTransito, emTransitoCD, emTransitoLoja, transitoLojas,
      receita, custoProdutos, custoPedidos, custoEstoque, custoFalta, custoEncerramento,
      lucro, nivelServico:nivel, fillRate:nivel, pedidoFornecedor:pedido
    });
  }

  const novoDia = diaAtual+1;
  await db.ref("jogo/estado").update({dia:novoDia});
  if(novoDia>=CFG.totalDias) alert("🏁 Jogo encerrado no dia "+novoDia+"!");
}

function resetar(){
  if(!confirm("Reiniciar todo o jogo? Isso apaga todos os dados.")) return;
  db.ref("equipes").remove();
  db.ref("decisoes").remove();
  db.ref("jogo/estado").set({dia:0, iniciado:false, partidaId: Date.now()});
}

/* ====== MODAL DE OPÇÕES ====== */
function abrirOpcoes(){
  $("cfgCompra").value=CFG.custoCompra;   $("cfgVenda").value=CFG.precoVenda;
  $("cfgEstoque").value=CFG.custoEstoque; $("cfgFalta").value=CFG.custoFalta;
  $("cfgPedido").value=CFG.custoPedido;   $("cfgEncerr").value=CFG.custoEncerramento;
  $("cfgFornLeadRap").value=CFG.forn_leadRapido;   $("cfgFornLeadEco").value=CFG.forn_leadEconomico;
  $("cfgLojaLeadRap").value=CFG.loja_leadRapido;   $("cfgLojaLeadEco").value=CFG.loja_leadEconomico;
  $("cfgDemMin").value=CFG.demandaMin; $("cfgDemMax").value=CFG.demandaMax;
  $("cfgDias").value=CFG.totalDias;    $("cfgEstoqueCD").value=CFG.estoqueInicialCD;
  $("overlay").style.display="flex";
}

function salvarOpcoes(){
  CFG = {
    ...CFG, // 🔒 preserva os fretes fixos
    custoCompra:+$("cfgCompra").value, precoVenda:+$("cfgVenda").value,
    custoEstoque:+$("cfgEstoque").value, custoFalta:+$("cfgFalta").value,
    custoPedido:+$("cfgPedido").value, custoEncerramento:+$("cfgEncerr").value,
    forn_leadRapido:+$("cfgFornLeadRap").value,   forn_leadEconomico:+$("cfgFornLeadEco").value,
    loja_leadRapido:+$("cfgLojaLeadRap").value,   loja_leadEconomico:+$("cfgLojaLeadEco").value,
    demandaMin:+$("cfgDemMin").value, demandaMax:+$("cfgDemMax").value,
    totalDias:+$("cfgDias").value,    estoqueInicialCD:+$("cfgEstoqueCD").value
  };
  db.ref("jogo/config").set(CFG);
  $("totalDias").textContent = CFG.totalDias;
  fecharOpcoes();
  alert("✅ Variáveis atualizadas!");
}

function fecharOpcoes(){ $("overlay").style.display="none"; }
